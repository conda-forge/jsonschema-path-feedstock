# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.4.4"
  python_check_max: "3.14"


package:
  name: jsonschema-path
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/j/jsonschema-path/jsonschema_path-${{ version }}.tar.gz
  sha256: 4c55842890fc384262a59fb63a25c86cc0e2b059e929c18b851c1d19ef612026

build:
  number: 0
  noarch: python
  script:
    - ${{ PYTHON }} -m pip install . -vv --no-deps --ignore-installed --disable-pip-version-check

requirements:
  host:
    - pip
    - poetry-core >=1.0.0
    - python ${{ python_min }}.*
  run:
    - pathable >=0.5.0,<0.6.0
    - python >=${{ python_min }}
    - pyyaml >=5.1
    - referencing <0.38.0
    - requests >=2.31.0,<3.0.0

tests:
  - python:
      imports: jsonschema_path
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - ${{ python_check_max }}.*
  - requirements:
      run:
        - mypy
        - types-pyyaml
        - types-requests
        - python ${{ python_min }}.*
    script:
      - mypy -p jsonschema_path

about:
  summary: JSONSchema Spec with object-oriented paths
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://pypi.org/project/jsonschema-path
  repository: https://github.com/p1c2u/jsonschema-path

extra:
  recipe-maintainers:
    - bollwyvl
